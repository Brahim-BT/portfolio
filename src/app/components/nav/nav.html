<header class="nav">
  <div class="nav__container">
    <a href="#" class="nav__logo" (click)="closeMenu()">
      <span class="nav__logo-text">Brahim Baibbat</span>
    </a>

    <ul class="nav__links">
      @for (link of navLinks; track link.label) {
        <li>
          <a [href]="link.href" class="nav__link" (click)="closeMenu()">{{ link.label }}</a>
        </li>
      }
    </ul>

    <button class="theme-toggle" (click)="toggleTheme()" [attr.aria-label]="isDarkMode() ? 'Switch to light mode' : 'Switch to dark mode'">
      @if (isDarkMode()) {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
      } @else {
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      }
    </button>

    <button class="nav__menu-btn" (click)="toggleMenu()" [attr.aria-expanded]="isMenuOpen()" aria-label="Toggle menu">
      <span class="nav__menu-icon" [class.nav__menu-icon--open]="isMenuOpen()">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>
  </div>
</header>

<div class="nav-overlay" [class.nav-overlay--open]="isMenuOpen()" (click)="closeMenu()"></div>

<nav class="nav-mobile" [class.nav-mobile--open]="isMenuOpen()" aria-hidden="{{!isMenuOpen()}}">
  <button class="nav-mobile__close" (click)="closeMenu()" aria-label="Close menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M18 6L6 18M6 6l12 12"/>
    </svg>
  </button>
  <ul class="nav-mobile__links">
    @for (link of navLinks; track link.label) {
      <li>
        <a [href]="link.href" class="nav-mobile__link" (click)="closeMenu()">{{ link.label }}</a>
      </li>
    }
  </ul>
</nav>
